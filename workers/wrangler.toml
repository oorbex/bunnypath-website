name = "bunnypath-activity-og"
main = "activity-og-worker.js"
compatibility_date = "2025-01-01"

# The Worker is bound to the production zone via a route trigger. Add the
# route in the Cloudflare dashboard (Workers & Pages -> this Worker ->
# Triggers -> Add Route) rather than here, since `routes` requires the
# zone_id and most folks find the dashboard friendlier for that step.
#
# Route to add:
#   Pattern: bunnypath.com/a/*
#   Zone:    bunnypath.com
#
# If you'd rather declare it in code, uncomment and fill in zone_id:
# routes = [
#   { pattern = "bunnypath.com/a/*", zone_name = "bunnypath.com" }
# ]

# SUPABASE_ANON_KEY is uploaded as a secret, not stored here:
#   wrangler secret put SUPABASE_ANON_KEY
